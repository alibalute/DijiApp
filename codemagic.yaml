workflows:
  ios-device:
    name: eTar Settings (device)
    max_build_duration: 60
    environment:
      vars:
        XCODE_PROJECT: "eTarSettings.xcodeproj"
        XCODE_SCHEME: "eTarSettings"
    scripts:
      - name: Build iOS app (device, unsigned)
        script: |
          xcodebuild -project "$XCODE_PROJECT" \
            -scheme "$XCODE_SCHEME" \
            -sdk iphoneos \
            -configuration Release \
            -derivedDataPath build \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            clean build
    artifacts:
      - build/Build/Products/Release-iphoneos/eTarSettings.app

  ios-adhoc:
    name: eTar Settings (Ad Hoc IPA)
    max_build_duration: 90
    environment:
      ios_signing:
        distribution_type: ad_hoc
        # Must match exactly the bundle ID in your Ad Hoc provisioning profile (and in the Xcode project)
        bundle_identifier: com.dijilele.eTarSettings
      vars:
        XCODE_PROJECT: "eTarSettings.xcodeproj"
        XCODE_SCHEME: "eTarSettings"
    scripts:
      - name: Set up code signing
        script: xcode-project use-profiles
      - name: Archive and export IPA
        script: |
          xcodebuild -project "$XCODE_PROJECT" \
            -scheme "$XCODE_SCHEME" \
            -configuration Release \
            -sdk iphoneos \
            -archivePath build/eTarSettings.xcarchive \
            archive
          xcodebuild -exportArchive \
            -archivePath build/eTarSettings.xcarchive \
            -exportPath build/export \
            -exportOptionsPlist exportOptions-adhoc.plist
    artifacts:
      - build/export/*.ipa

  ios-simulator:
    name: eTar Settings (simulator → Appetize)
    max_build_duration: 60
    environment:
      vars:
        XCODE_PROJECT: "eTarSettings.xcodeproj"
        XCODE_SCHEME: "eTarSettings"
    scripts:
      - name: Build iOS app (simulator)
        script: |
          xcodebuild -project "$XCODE_PROJECT" \
            -scheme "$XCODE_SCHEME" \
            -sdk iphonesimulator \
            -destination 'generic/platform=iOS Simulator' \
            -configuration Release \
            -derivedDataPath build \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            clean build
      - name: Zip app for Appetize.io
        script: |
          cd build/Build/Products/Release-iphonesimulator
          zip -r ../../../eTarSettings-simulator.zip eTarSettings.app
    artifacts:
      - build/eTarSettings-simulator.zip
