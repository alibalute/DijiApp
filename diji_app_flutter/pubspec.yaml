name: diji_app_flutter
description: DijiApp - Flutter app (WebView + BLE bridge).
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_inappwebview: ^6.0.0
  url_launcher: ^6.3.1
  flutter_svg: ^2.0.10
  flutter_blue_plus: ^1.31.0
  permission_handler: ^11.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.14.3

flutter:
  uses-material-design: true
  assets:
    - assets/qui-skinned.html
    - assets/logo.png
    - assets/icons/instagram.svg


# App icon: put your master art at assets/app_icon.png (1024×1024 PNG).
# Then run: dart run flutter_launcher_icons
#
# White margin / breathing room on home screens:
# - Android: adaptive_icon_background + adaptive_icon_foreground_inset shrink the
#   foreground so more of the background color (#FFFFFF) shows (not cropped away).
# - iOS: the generator scales the full square; add opaque white padding inside your PNG
#   (smaller logo in frame) — iOS does not apply an inset like Android adaptive icons.
# - remove_alpha_ios: true fills transparent pixels with white so edges are not lost.
flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/app_icon.png
  remove_alpha_ios: true
  # Adaptive icons (API 26+): required pair; inset is % padding on foreground (default 16).
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: assets/app_icon.png
  adaptive_icon_foreground_inset: 22


