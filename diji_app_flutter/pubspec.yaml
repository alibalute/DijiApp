name: diji_app_flutter
description: DijiApp - Flutter app (WebView + BLE bridge).
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_inappwebview: ^6.0.0
  webview_flutter: ^4.10.0
  flutter_blue_plus: ^1.31.0
  permission_handler: ^11.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.14.3

flutter:
  uses-material-design: true
  assets:
    - assets/qui-skinned.html
    - assets/logo.png


# App icon: put your logo as assets/app_icon.png (1024x1024 px), then run: dart run flutter_launcher_icons
flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/app_icon.png
  remove_alpha_ios: true


