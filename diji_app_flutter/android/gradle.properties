org.gradle.jvmargs=-Xmx8G -XX:MaxMetaspaceSize=4G -XX:ReservedCodeCacheSize=512m -XX:+HeapDumpOnOutOfMemoryError
android.useAndroidX=true

# If Gradle reports duplicate types (e.g. io.flutter.plugins.urllauncher BuildConfig) or plugin jars contain
# classes named like "BuildConfig 2.class", run: flutter clean && rm -rf build android/.gradle

# Avoid Kotlin incremental cache errors when project (e.g. H:) and Pub cache (C:) are on different drives
kotlin.incremental=false
